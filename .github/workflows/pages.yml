name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # zero dependencies, so there is nothing to install
      #
      # `node bin/lore.js` used to run here and validated the hand-written lore packs.
      # The seed-engine rebuild deleted both the packs and that script, and this step
      # kept running it — so the first push after the rebuild failed the deploy on a
      # MODULE_NOT_FOUND for a file that no longer exists. The worlds are generated now,
      # and the generator validates every one of them it can mint (gen/validate.js),
      # which is what `npm test` covers.
      - name: every world the generator can mint is valid, and the sim holds
        run: node --test test/*.test.js

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # the site IS the repo: index.html imports ./src/*.js as ES modules
      # straight from source. no build, no bundler, nothing to go stale.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
